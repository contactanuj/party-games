version: 2
updates:
  # npm dependencies for the monorepo (apps + packages share one lockfile at the root).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels: ["dependencies"]
    # Group the Expo / React Native toolchain so an SDK bump arrives as ONE reviewable PR
    # (these packages must move together; piecemeal bumps break the build).
    groups:
      expo-react-native:
        patterns:
          - "expo"
          - "expo-*"
          - "@expo/*"
          - "react"
          - "react-*"
          - "react-native"
          - "react-native-*"
          - "metro"
          - "metro-*"
      dev-tooling:
        patterns:
          - "@babel/*"
          - "eas-cli"

  # Keep GitHub Actions used by the CI/build workflows up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "ci"]
